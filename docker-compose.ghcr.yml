# Docker Compose configuration for pre-built images from GitHub Container Registry (GHCR)
#
# Usage:
#   Primary node: docker compose -f docker-compose.ghcr.yml up -d
#   Secondary:   docker compose -f docker-compose.ghcr.yml --profile secondary up -d
#
# Version pinning (recommended for production):
#   POWERBLOCKADE_VERSION=v0.6.0 docker compose -f docker-compose.ghcr.yml up -d
#
# Custom registry/org:
#   POWERBLOCKADE_REPO=myorg docker compose -f docker-compose.ghcr.yml up -d

services:
  # ============================================
  # CORE SERVICES (run on both primary and secondary)
  # ============================================

  dnsdist:
    image: powerdns/dnsdist-19:latest
    container_name: powerblockade-dnsdist
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint.sh"]
    environment:
      RECURSOR_IP: ${RECURSOR_IP:-172.30.0.10}
      DNSTAP_PROCESSOR_IP: ${DNSTAP_PROCESSOR_IP:-172.30.0.20}
    ports:
      - "${DNSDIST_LISTEN_ADDRESS:-0.0.0.0}:53:53/udp"
      - "${DNSDIST_LISTEN_ADDRESS:-0.0.0.0}:53:53/tcp"
    volumes:
      - ./dnsdist/dnsdist.conf.template:/etc/dnsdist/dnsdist.conf.template:ro
      - ./dnsdist/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - dnstap-socket:/var/run/dnstap
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - default
    depends_on:
      recursor:
        condition: service_started
      dnstap-processor:
        condition: service_started

  init-permissions:
    image: busybox:latest
    container_name: powerblockade-init-permissions
    command: sh -c "chown -R 1000:1000 /shared/rpz && chmod -R 775 /shared/rpz && touch /shared/rpz/.gitkeep && chown 1000:1000 /shared/forward-zones.conf && chmod 664 /shared/forward-zones.conf"
    volumes:
      - ./recursor/rpz:/shared/rpz
      - ./recursor/forward-zones.conf:/shared/forward-zones.conf
    restart: "no"

  recursor:
    image: ghcr.io/${POWERBLOCKADE_REPO:-zerostate-io}/powerblockade-recursor:${POWERBLOCKADE_VERSION:-latest}
    container_name: powerblockade-recursor
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE:-America/Los_Angeles}
      RECURSOR_API_KEY: ${RECURSOR_API_KEY:-change-me}
    ports:
      - "8082:8082"
    volumes:
      - ./recursor/recursor.conf.template:/etc/pdns-recursor/recursor.conf.template:ro
      - ./recursor/rpz.lua:/etc/pdns-recursor/rpz.lua:ro
      - ./recursor/forward-zones.conf:/etc/pdns-recursor/forward-zones.conf:ro
      - ./recursor/rpz:/etc/pdns-recursor/rpz
      - dnstap-socket:/var/run/dnstap
      - recursor-control-socket:/var/run/pdns-recursor
    cap_add:
      - NET_BIND_SERVICE
    networks:
      default:
        ipv4_address: ${RECURSOR_IP:-172.30.0.10}

  recursor-reloader:
    image: powerdns/pdns-recursor-51:latest
    container_name: powerblockade-recursor-reloader
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - >-
        while true; do
          rec_control --socket-dir=/var/run/pdns-recursor reload-zones || true;
          rec_control --socket-dir=/var/run/pdns-recursor reload-lua-config || true;
          rec_control --socket-dir=/var/run/pdns-recursor reload-fzones || true;
          sleep ${RECURSOR_RELOAD_INTERVAL_SECONDS:-5};
        done
    volumes:
      - recursor-control-socket:/var/run/pdns-recursor
      - ./recursor/forward-zones.conf:/etc/pdns-recursor/forward-zones.conf:ro
    depends_on:
      recursor:
        condition: service_started

  dnstap-processor:
    image: ghcr.io/${POWERBLOCKADE_REPO:-zerostate-io}/powerblockade-dnstap-processor:${POWERBLOCKADE_VERSION:-latest}
    container_name: powerblockade-dnstap-processor
    restart: unless-stopped
    environment:
      NODE_NAME: ${NODE_NAME:-primary}
      DNSTAP_SOCKET: ${DNSTAP_SOCKET:-/var/run/dnstap/dnstap.sock}
      # DNSTAP_LISTEN enables TCP listener for dnsdist framestream
      DNSTAP_LISTEN: "${DNSTAP_LISTEN:-0.0.0.0:6000}"
      PROTOBUF_LISTEN: "${PROTOBUF_LISTEN:-0.0.0.0:50001}"
      # PRIMARY_URL points to primary's admin-ui for event ingestion
      PRIMARY_URL: ${PRIMARY_URL:-http://admin-ui:8080}
      PRIMARY_API_KEY: ${PRIMARY_API_KEY:-}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-}
      DEBUG_DNSTAP: ${DEBUG_DNSTAP:-false}
      GELF_ENABLED: ${GELF_ENABLED:-false}
      GELF_ENDPOINT: ${GELF_ENDPOINT:-}
      BUFFER_PATH: ${BUFFER_PATH:-/var/lib/dnstap-processor/buffer.db}
      BUFFER_MAX_BYTES: ${BUFFER_MAX_BYTES:-100MB}
      BUFFER_MAX_AGE: ${BUFFER_MAX_AGE:-86400}
    expose:
      - "6000"
      - "50001"
      NODE_NAME: ${NODE_NAME:-primary}
      DNSTAP_SOCKET: ${DNSTAP_SOCKET:-/var/run/dnstap/dnstap.sock}
      PROTOBUF_LISTEN: "${PROTOBUF_LISTEN:-0.0.0.0:50001}"
      # PRIMARY_URL points to primary's admin-ui for event ingestion
      PRIMARY_URL: ${PRIMARY_URL:-http://admin-ui:8080}
      PRIMARY_API_KEY: ${PRIMARY_API_KEY:-}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-}
      DEBUG_DNSTAP: ${DEBUG_DNSTAP:-false}
      GELF_ENABLED: ${GELF_ENABLED:-false}
      GELF_ENDPOINT: ${GELF_ENDPOINT:-}
      BUFFER_PATH: ${BUFFER_PATH:-/var/lib/dnstap-processor/buffer.db}
      BUFFER_MAX_BYTES: ${BUFFER_MAX_BYTES:-100MB}
      BUFFER_MAX_AGE: ${BUFFER_MAX_AGE:-86400}
    expose:
      - "50001"
    networks:
      default:
        ipv4_address: ${DNSTAP_PROCESSOR_IP:-172.30.0.20}
    volumes:
      - dnstap-socket:/var/run/dnstap
      - ./recursor/rpz:/shared/rpz:ro
      - dnstap-buffer:/var/lib/dnstap-processor
    depends_on:
      recursor:
        condition: service_started
      # No admin-ui dependency - sends to PRIMARY over network

  # ============================================
  # SECONDARY-ONLY SERVICES
  # ============================================

  sync-agent:
    image: ghcr.io/${POWERBLOCKADE_REPO:-zerostate-io}/powerblockade-sync-agent:${POWERBLOCKADE_VERSION:-latest}
    container_name: powerblockade-sync-agent
    restart: unless-stopped
    profiles:
      - secondary
    environment:
      NODE_NAME: ${NODE_NAME:-secondary}
      # PRIMARY_URL points to primary's admin-ui for config sync and heartbeats
      PRIMARY_URL: ${PRIMARY_URL:-http://admin-ui:8080}
      PRIMARY_API_KEY: ${PRIMARY_API_KEY:-}
      RECURSOR_API_KEY: ${RECURSOR_API_KEY:-}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-60}
      CONFIG_SYNC_INTERVAL_SECONDS: ${CONFIG_SYNC_INTERVAL_SECONDS:-300}
      RECURSOR_API_URL: ${RECURSOR_API_URL:-http://recursor:8082}
      RPZ_DIR: /etc/pdns-recursor/rpz
      FORWARD_ZONES_PATH: /etc/pdns-recursor/forward-zones.conf
      METRICS_BUFFER_PATH: ${METRICS_BUFFER_PATH:-/var/lib/powerblockade/metrics.db}
      METRICS_BUFFER_MAX_AGE: ${METRICS_BUFFER_MAX_AGE:-604800}
      DNS_SERVER: ${DNS_SERVER:-dnsdist}
    volumes:
      - ./recursor/rpz:/etc/pdns-recursor/rpz
      - ./recursor/forward-zones.conf:/etc/pdns-recursor/forward-zones.conf
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      recursor:
        condition: service_started
      # No admin-ui dependency - connects to PRIMARY over network

  # ============================================
  # PRIMARY-ONLY SERVICES
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: powerblockade-postgres
    restart: unless-stopped
    profiles:
      - primary
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-powerblockade}
      POSTGRES_USER: ${POSTGRES_USER:-powerblockade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-powerblockade} -d ${POSTGRES_DB:-powerblockade}"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-ui:
    image: ghcr.io/${POWERBLOCKADE_REPO:-zerostate-io}/powerblockade-admin-ui:${POWERBLOCKADE_VERSION:-latest}
    container_name: powerblockade-admin-ui
    restart: unless-stopped
    profiles:
      - primary
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://powerblockade:change-me@postgres:5432/powerblockade}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-me-32+-chars}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      PRIMARY_API_KEY: ${PRIMARY_API_KEY:-}
      LOCAL_NODE_API_KEY: ${LOCAL_NODE_API_KEY:-}
      NODE_NAME: ${NODE_NAME:-primary}
      RECURSOR_API_URL: ${RECURSOR_API_URL:-http://recursor:8082}
      RECURSOR_API_KEY: ${RECURSOR_API_KEY:-change-me}
      TIMEZONE: ${TIMEZONE:-America/Los_Angeles}
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3000}
      POWERBLOCKADE_ALLOW_INSECURE: ${POWERBLOCKADE_ALLOW_INSECURE:-false}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    expose:
      - "8080"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      recursor:
        condition: service_started
    volumes:
      - ./recursor/rpz:/shared/rpz
      - ./recursor/forward-zones.conf:/shared/forward-zones.conf

  prometheus:
    image: prom/prometheus:latest
    container_name: powerblockade-prometheus
    restart: unless-stopped
    profiles:
      - primary
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:latest
    container_name: powerblockade-grafana
    restart: unless-stopped
    profiles:
      - primary
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_CSRF_ALWAYS_CHECK: "false"
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: "${GRAFANA_CSRF_ORIGINS:-*}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:8080/grafana/}"
      # Postgres datasource credentials (used in provisioning)
      POSTGRES_USER: ${POSTGRES_USER:-powerblockade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-powerblockade}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  dnstap-socket:
  recursor-control-socket:
  dnstap-buffer:

networks:
  default:
    name: powerblockade
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.30.0.0/24}