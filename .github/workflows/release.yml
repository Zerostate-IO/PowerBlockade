name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.7.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no pushes)'
        required: false
        type: boolean
        default: true
      skip_docker:
        description: 'Skip Docker builds'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zerostate-io/powerblockade

jobs:
  # Phase 1: Update versions in all files
  update-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh remote tags
        run: git fetch --tags --force origin

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: vX.Y.Z (e.g., v0.7.0)"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          VERSION_WITHOUT_V="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION_WITHOUT_V\"/" admin-ui/pyproject.toml
          echo "✅ Updated pyproject.toml to $VERSION_WITHOUT_V"

      - name: Update version in settings.py
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          # Match the actual format: pb_version: str = "..."
          sed -i "s/^pb_version: str = \".*\"/pb_version: str = \"$VERSION\"/" admin-ui/app/settings.py
          echo "✅ Updated settings.py to $VERSION"

      - name: Update version in Dockerfiles
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          # Update admin-ui Dockerfile
          sed -i "s/^ARG PB_VERSION=.*/ARG PB_VERSION=$VERSION/" admin-ui/Dockerfile
          
          # Update dnstap-processor Dockerfile
          sed -i "s/^ARG PB_VERSION=.*/ARG PB_VERSION=$VERSION/" dnstap-processor/Dockerfile
          
          # Update sync-agent Dockerfile
          sed -i "s/^ARG PB_VERSION=.*/ARG PB_VERSION=$VERSION/" sync-agent/Dockerfile
          
          echo "✅ Updated all Dockerfiles to $VERSION"

      - name: Update docker-compose.ghcr.yml image tags
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          sed -i "s|ghcr.io/zerostate-io/powerblockade-admin-ui:.*|ghcr.io/zerostate-io/powerblockade-admin-ui:$VERSION|" docker-compose.ghcr.yml
          sed -i "s|ghcr.io/zerostate-io/powerblockade-recursor:.*|ghcr.io/zerostate-io/powerblockade-recursor:$VERSION|" docker-compose.ghcr.yml
          sed -i "s|ghcr.io/zerostate-io/powerblockade-dnstap-processor:.*|ghcr.io/zerostate-io/powerblockade-dnstap-processor:$VERSION|" docker-compose.ghcr.yml
          sed -i "s|ghcr.io/zerostate-io/powerblockade-sync-agent:.*|ghcr.io/zerostate-io/powerblockade-sync-agent:$VERSION|" docker-compose.ghcr.yml
          echo "✅ Updated docker-compose.ghcr.yml image tags to $VERSION"

      - name: Check for modified files
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Files modified:"
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ No files were modified"
          fi

      - name: Commit version updates
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${{ steps.validate.outputs.version }}

          Co-authored-by: Sisyphus <clio-agent@sisyphuslabs.ai>"
          echo "✅ Changes committed"

      - name: Configure git identity for tagging
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push Git tag
        if: github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "✅ Tag $VERSION already exists locally"
          else
            git tag -a "$VERSION" -m "Release $VERSION

            Automated release created via GitHub Actions
            Co-authored-by: Sisyphus <clio-agent@sisyphuslabs.ai>"
          fi

          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "✅ Tag $VERSION already exists on origin"
          else
            git push origin "$VERSION"
            echo "✅ Tag $VERSION pushed to origin"
          fi

  # Phase 2: Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    needs: update-versions
    if: github.event.inputs.skip_docker != 'true'
    strategy:
      matrix:
        include:
          - image: admin-ui
            context: ./admin-ui
            dockerfile: ./admin-ui/Dockerfile
          - image: recursor
            context: ./recursor
            dockerfile: ./recursor/Dockerfile
          - image: dnstap-processor
            context: ./dnstap-processor
            dockerfile: ./dnstap-processor/Dockerfile
          - image: sync-agent
            context: ./sync-agent
            dockerfile: ./sync-agent/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}:${{ needs.update-versions.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}:latest
          build-args: |
            PB_VERSION=${{ needs.update-versions.outputs.version }}
      - name: Image build summary
        run: |
          echo "✅ Built and pushed ${{ matrix.image }}:${{ needs.update-versions.outputs.version }}"

  # Phase 3: Runtime Gate (Release-Blocking)
  runtime-gate:
    runs-on: ubuntu-latest
    needs: [update-versions, build-and-push]
    if: github.event.inputs.skip_docker != 'true'
    env:
      POWERBLOCKADE_VERSION: ${{ needs.update-versions.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull fresh images
        run: |
          VERSION="${{ needs.update-versions.outputs.version }}"
          docker pull ghcr.io/zerostate-io/powerblockade-admin-ui:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-recursor:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-dnstap-processor:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-sync-agent:$VERSION

      - name: Prepare runtime gate environment
        run: |
          TEST_ADMIN_USERNAME="runtime-gate-admin"
          TEST_ADMIN_PASSWORD="runtime-gate-password-${GITHUB_RUN_ID}"

          ./scripts/init-env.sh --non-interactive \
            --node-name "runtime-gate" \
            --admin-username "$TEST_ADMIN_USERNAME" \
            --admin-password "$TEST_ADMIN_PASSWORD" \
            --dns-bind-address "0.0.0.0"

          {
            echo "TEST_ADMIN_USERNAME=$TEST_ADMIN_USERNAME"
            echo "TEST_ADMIN_PASSWORD=$TEST_ADMIN_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Create compose override for CI runtime gate
        run: |
          cat > "$RUNNER_TEMP/runtime-gate.override.yml" <<'EOF'
          services:
            dnsdist:
              ports: []
            admin-ui:
              ports:
                - "18080:8080"
          EOF

      - name: Start runtime gate stack
        run: |
          docker compose \
            -f docker-compose.ghcr.yml \
            -f "$RUNNER_TEMP/runtime-gate.override.yml" \
            up -d

      - name: Wait for core services
        run: |
          waited=0
          healthy=false

          while [[ $waited -lt 120 ]]; do
            containers_status=$(docker compose \
              -f docker-compose.ghcr.yml \
              -f "$RUNNER_TEMP/runtime-gate.override.yml" \
              ps --format "{{.Names}}:{{.Status}}" 2>/dev/null || echo "")

            required=("powerblockade-dnsdist" "powerblockade-recursor" "powerblockade-postgres" "powerblockade-admin-ui")
            healthy_count=0

            for container in "${required[@]}"; do
              if echo "$containers_status" | grep -qE "${container}.*(healthy|running|Up)"; then
                healthy_count=$((healthy_count + 1))
              fi
            done

            if [[ $healthy_count -eq ${#required[@]} ]]; then
              healthy=true
              break
            fi

            sleep 2
            waited=$((waited + 2))
          done

          if [[ "$healthy" != "true" ]]; then
            docker compose \
              -f docker-compose.ghcr.yml \
              -f "$RUNNER_TEMP/runtime-gate.override.yml" \
              ps
            exit 1
          fi

      - name: Verify admin runtime health
        run: |
          sleep 5

          ROOT_RESPONSE=$(curl -s -i "http://localhost:18080/" 2>/dev/null || true)
          ROOT_CODE=$(printf "%s" "$ROOT_RESPONSE" | awk 'NR==1 {print $2}')
          if [[ "$ROOT_CODE" != "200" ]]; then
            printf "%s\n" "$ROOT_RESPONSE" | sed -n '1,20p'
            exit 1
          fi

          LOGIN_PAGE_RESPONSE=$(curl -s -i "http://localhost:18080/login" 2>/dev/null || true)
          LOGIN_PAGE_CODE=$(printf "%s" "$LOGIN_PAGE_RESPONSE" | awk 'NR==1 {print $2}')
          if [[ "$LOGIN_PAGE_CODE" != "200" ]]; then
            printf "%s\n" "$LOGIN_PAGE_RESPONSE" | sed -n '1,20p'
            exit 1
          fi

          LOGIN_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -F "username=$TEST_ADMIN_USERNAME" \
            -F "password=$TEST_ADMIN_PASSWORD" \
            "http://localhost:18080/login" 2>/dev/null || echo -e "\n000")

          LOGIN_BODY=$(echo "$LOGIN_RESPONSE" | head -n -1)
          LOGIN_CODE=$(echo "$LOGIN_RESPONSE" | tail -n 1)

          if [[ "$LOGIN_CODE" != "302" && "$LOGIN_CODE" != "200" ]]; then
            echo "$LOGIN_BODY" | head -20
            exit 1
          fi

          if [[ "$LOGIN_CODE" == "200" ]] && echo "$LOGIN_BODY" | grep -qi "invalid credentials"; then
            exit 1
          fi

          HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:18080/health" 2>/dev/null || echo "000")
          if [[ "$HEALTH_CODE" != "200" ]]; then
            exit 1
          fi

      - name: Cleanup runtime gate stack
        if: always()
        run: |
          docker compose \
            -f docker-compose.ghcr.yml \
            -f "$RUNNER_TEMP/runtime-gate.override.yml" \
            down -v --remove-orphans || true

  # Phase 4: Fresh Install Smoke Test (Advisory)
  smoke-test:
    runs-on: ubuntu-latest
    needs: [update-versions, build-and-push]
    if: github.event.inputs.skip_docker != 'true'
    outputs:
      smoke_outcome: ${{ steps.smoke_run.outcome }}
    env:
      POWERBLOCKADE_VERSION: ${{ needs.update-versions.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull fresh images
        run: |
          VERSION="${{ needs.update-versions.outputs.version }}"
          docker pull ghcr.io/zerostate-io/powerblockade-admin-ui:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-recursor:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-dnstap-processor:$VERSION
          docker pull ghcr.io/zerostate-io/powerblockade-sync-agent:$VERSION

      - name: Run fresh install smoke test
        id: smoke_run
        continue-on-error: true
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      - name: Report advisory smoke test status
        if: steps.smoke_run.outcome == 'failure'
        run: |
          echo "::warning::Fresh install smoke test failed on this runner. Release publication is gated by runtime-gate; investigate smoke-test logs for install-path issues."

  # Phase 5: Create GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [update-versions, build-and-push, runtime-gate]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.update-versions.result == 'success' &&
      (
        github.event.inputs.skip_docker == 'true' ||
        (needs.build-and-push.result == 'success' && needs.runtime-gate.result == 'success')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          VERSION="${{ needs.update-versions.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -n 1 || true)
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            RANGE_END="${VERSION}"
          else
            RANGE_END="HEAD"
          fi

          if [ -z "$PREVIOUS_TAG" ]; then
            {
              echo "### Changes"
              echo "Initial release or first tagged version"
            } > release-notes.md
          else
            {
              echo "### Changes since $PREVIOUS_TAG"
              echo ""
              git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${RANGE_END}" || echo "- No commits found between tags"
            } > release-notes.md
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ needs.update-versions.outputs.version }}';
            const changelog = fs.readFileSync('release-notes.md', 'utf8');
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Release ${version}`,
              body: changelog,
              draft: false,
              prerelease: false
            });
            
            console.log(`✅ GitHub Release created for ${version}`);

  # Summary job
  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [update-versions, build-and-push, runtime-gate, smoke-test, create-release]
    steps:
      - name: Release summary
        run: |
          echo "## Release Summary"
          echo ""
          echo "✅ Version: ${{ needs.update-versions.outputs.version }}"
          echo "✅ Dry run: ${{ github.event.inputs.dry_run }}"
          echo "✅ Docker builds: ${{ github.event.inputs.skip_docker != 'true' }}"
          echo "✅ Runtime gate: ${{ needs.runtime-gate.result }}"
          echo "✅ Advisory install smoke: ${{ needs.smoke-test.outputs.smoke_outcome || needs.smoke-test.result || 'skipped' }}"
          echo "✅ GitHub release job: ${{ needs.create-release.result }}"
          echo ""
          echo "## Next Steps"
          echo "If dry_run=true, review the changes above and re-run with dry_run=false"
          echo "If skip_docker=true, Docker images were not built or pushed"
          echo "If advisory install smoke failed, review the smoke-test job logs for host-specific install-path issues"
